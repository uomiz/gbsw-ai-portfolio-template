# GitHub Actions - 자동 배포 워크플로우
name: Deploy to Render and GitHub Pages

on:
  push:
    branches:
      - main  # main 브랜치에 push하면 자동 배포
  workflow_dispatch:  # 수동 실행 가능

jobs:
  # Job 1: 백엔드 API 배포 (Render)
  deploy-api:
    name: Deploy API to Render
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build projects.json
        run: |
          echo "🔨 프로젝트 데이터 빌드 중..."
          python data/build.py

      - name: Run tests (optional)
        run: |
          echo "✅ 테스트 생략 (추후 추가 가능)"
          # pytest tests/ 등 추가 가능

      - name: Notify Render deployment
        run: |
          echo "🚀 Render는 GitHub push를 감지하여 자동 배포합니다"
          echo "📊 배포 상태: https://dashboard.render.com"

  # Job 2: 프론트엔드 배포 (GitHub Pages)
  deploy-frontend:
    name: Deploy Frontend to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Build projects.json
        run: |
          echo "🔨 프로젝트 데이터 빌드 중..."
          python data/build.py

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './web'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Output deployment URL
        run: |
          echo "✅ 프론트엔드 배포 완료!"
          echo "🌐 URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
